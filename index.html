<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Claude OS — Reel</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Instrument+Serif&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: #000; overflow: hidden; }
  /* 9:16 dikey sahne (reel formatı) */
  #stage {
    position: fixed; inset: 0; margin: auto;
    width: min(100vw, 56.25vh); height: min(177.78vw, 100vh);
    background: #000; overflow: hidden;
  }
  canvas { position: absolute; inset: 0; width: 100% !important; height: 100% !important; }

  /* ---------- HUD ust cubuk ---------- */
  .hud { position: absolute; inset: 0; pointer-events: none;
         font-family: 'JetBrains Mono', monospace; color: #cbd5e1; z-index: 5; }
  .hud .row { position: absolute; left: 3%; right: 3%; display: flex; gap: 8px; align-items: center; }
  .chip { border: 1px solid rgba(148,163,184,.35); background: rgba(10,12,20,.55);
          padding: 3px 8px; font-size: 8px; letter-spacing: 1px; color: #94a3b8;
          text-transform: uppercase; white-space: nowrap; backdrop-filter: blur(2px); }
  .chip.on { color: #fbbf24; border-color: rgba(251,191,36,.5); box-shadow: 0 0 10px rgba(251,191,36,.25) inset; }
  .chip.dim { opacity: .5; }
  .top { top: 3.2%; }
  .top-right { top: 3.2%; right: 3%; left: auto; justify-content: flex-end; }
  .briefing { top: 8.5%; left: 50%; transform: translateX(-50%);
              display: flex; gap: 6px; align-items: center; }
  .dot { width: 5px; height: 5px; border-radius: 50%; background: #f43f5e; box-shadow: 0 0 8px #f43f5e;
         animation: blink 1.4s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

  /* ---------- sol node graph overlay ---------- */
  .graph { position: absolute; left: 0; top: 12%; width: 46%; height: 62%; z-index: 4;
           font-family: 'JetBrains Mono', monospace; pointer-events: none; }
  .graph svg { position: absolute; inset: 0; width: 100%; height: 100%; overflow: visible; }
  .node { position: absolute; transform: translate(-50%,-50%); }
  .node .ring { width: 9px; height: 9px; border-radius: 50%; border: 1px solid rgba(148,163,184,.7);
                background: rgba(2,6,23,.6); }
  .node.hot .ring { border-color: #34d399; background: #34d399; box-shadow: 0 0 12px #34d399; }
  .node.warn .ring { border-color: #fbbf24; background: #fbbf24; box-shadow: 0 0 10px #fbbf24; }
  .node .lbl { position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
               font-size: 7.5px; letter-spacing: .8px; color: #94a3b8; white-space: nowrap;
               text-transform: uppercase; text-shadow: 0 0 6px #000; }
  .node.hot .lbl { color: #6ee7b7; }

  /* ---------- POV caption ---------- */
  .pov { position: absolute; left: 8%; right: 8%; bottom: 20%; z-index: 6; text-align: center;
         font-family: 'Instrument Serif', Georgia, serif; color: #f8fafc; font-size: 27px;
         line-height: 1.2; text-shadow: 0 2px 24px rgba(0,0,0,.9); }
  .grain { position: absolute; inset: 0; z-index: 7; pointer-events: none; opacity: .05;
           background-image: radial-gradient(rgba(255,255,255,.9) .5px, transparent .5px);
           background-size: 3px 3px; }
  .vignette { position: absolute; inset: 0; z-index: 3; pointer-events: none;
              background: radial-gradient(120% 90% at 50% 45%, transparent 55%, rgba(0,0,0,.85) 100%); }
</style>

<div id="stage">
  <div class="vignette"></div>

  <div class="hud">
    <div class="row top">
      <span class="chip on">◍ Business</span>
      <span class="chip">+ Personal</span>
      <span class="chip dim">Memory</span>
    </div>
    <div class="row top-right">
      <span class="chip dim">CTX 84%</span>
      <span class="chip">NODES 312</span>
    </div>
    <div class="briefing">
      <span class="dot"></span>
      <span class="chip on" id="briefing">BRIEFING · LIVE 06 / 25 · 10:29 PM</span>
    </div>
  </div>

  <div class="graph">
    <svg id="edges"></svg>
    <!-- node'lar JS ile yerlestiriliyor -->
  </div>

  <!-- Uzerine yazi istersen buraya ekle: <div class="pov">Senin yazin</div> -->
  <div class="grain"></div>
</div>

<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
}}
</script>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

const stage = document.getElementById('stage');
const W = () => stage.clientWidth, H = () => stage.clientHeight;

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(W(), H());
renderer.setClearColor(0x02030a, 1);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.5;
stage.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x02030a, 0.006);
const camera = new THREE.PerspectiveCamera(52, W() / H(), 0.1, 300);
camera.position.set(0, 13, 25);
camera.lookAt(0, 0, 0);

/* ---------------- yildiz alani ---------------- */
function starfield(n, spread, size, color) {
  const g = new THREE.BufferGeometry();
  const p = new Float32Array(n * 3);
  for (let i = 0; i < n; i++) {
    p[i*3]   = (Math.random()-.5) * spread;
    p[i*3+1] = (Math.random()-.5) * spread;
    p[i*3+2] = (Math.random()-.5) * spread;
  }
  g.setAttribute('position', new THREE.BufferAttribute(p, 3));
  const m = new THREE.PointsMaterial({ size, color, transparent: true, opacity: .8,
    blending: THREE.AdditiveBlending, depthWrite: false, sizeAttenuation: true });
  return new THREE.Points(g, m);
}
scene.add(starfield(2200, 240, .18, 0x8899cc));

/* ---------------- akresyon diski / nebula ---------------- */
const COUNT = 34000;
const pos = new Float32Array(COUNT * 3);
const col = new Float32Array(COUNT * 3);
const rad = new Float32Array(COUNT);
const ang = new Float32Array(COUNT);
const siz = new Float32Array(COUNT);
const seed = new Float32Array(COUNT);

const cInner = new THREE.Color(0xfff1d6); // sicak cekirdek
const cHot   = new THREE.Color(0xff7a2f); // turuncu
const cMid   = new THREE.Color(0xc026d3); // magenta/mor
const cOut   = new THREE.Color(0x22d3ee); // teal
const tmp = new THREE.Color();
const R = 16;

for (let i = 0; i < COUNT; i++) {
  const t = Math.pow(Math.random(), 1.25);     // hafif merkeze yogunlasma
  const r = 3.0 + t * R;                        // ortada net "goz" bosluğu
  const a = Math.random() * Math.PI * 2;
  const thick = 1.1 * (1 - t) + 0.3;           // ice dogru ince disk
  rad[i] = r; ang[i] = a; seed[i] = Math.random();
  pos[i*3]   = Math.cos(a) * r;
  pos[i*3+1] = (Math.random()-.5) * thick * 2.2;
  pos[i*3+2] = Math.sin(a) * r;

  const f = r / (R + 1.4);
  if (f < .28)      tmp.copy(cInner).lerp(cHot, f/.28);
  else if (f < .60) tmp.copy(cHot).lerp(cMid, (f-.28)/.32);
  else              tmp.copy(cMid).lerp(cOut, (f-.60)/.40);
  const b = 0.35 + Math.random()*0.45;
  col[i*3]=tmp.r*b; col[i*3+1]=tmp.g*b; col[i*3+2]=tmp.b*b;
  siz[i] = (0.4 + Math.random()*1.25) * (1.2 - f*0.6);
}

const dg = new THREE.BufferGeometry();
dg.setAttribute('position', new THREE.BufferAttribute(pos, 3));
dg.setAttribute('aColor', new THREE.BufferAttribute(col, 3));
dg.setAttribute('aRadius', new THREE.BufferAttribute(rad, 1));
dg.setAttribute('aAngle', new THREE.BufferAttribute(ang, 1));
dg.setAttribute('aSize', new THREE.BufferAttribute(siz, 1));
dg.setAttribute('aSeed', new THREE.BufferAttribute(seed, 1));

const diskMat = new THREE.ShaderMaterial({
  uniforms: { uTime: { value: 0 }, uPix: { value: renderer.getPixelRatio() } },
  transparent: true, depthWrite: false, blending: THREE.AdditiveBlending,
  vertexShader: `
    attribute vec3 aColor; attribute float aRadius; attribute float aAngle;
    attribute float aSize; attribute float aSeed;
    uniform float uTime; uniform float uPix; varying vec3 vColor; varying float vSeed;
    void main(){
      float speed = 0.55 / (aRadius*0.16 + 0.6);      // ice dogru hizli -> spiral
      float a = aAngle + uTime * speed;
      float wob = sin(uTime*0.6 + aSeed*6.28) * 0.15; // hafif dalga
      float r = aRadius + wob;
      vec3 p = vec3(cos(a)*r, position.y + sin(uTime*0.4+aSeed*6.28)*0.15, sin(a)*r);
      vColor = aColor; vSeed = aSeed;
      vec4 mv = modelViewMatrix * vec4(p,1.0);
      gl_PointSize = aSize * uPix * (170.0 / -mv.z);
      gl_Position = projectionMatrix * mv;
    }`,
  fragmentShader: `
    varying vec3 vColor; varying float vSeed;
    void main(){
      vec2 d = gl_PointCoord - 0.5;
      float dd = dot(d,d);
      if (dd > 0.25) discard;
      float a = smoothstep(0.25, 0.0, dd);
      gl_FragColor = vec4(vColor, a*0.55);
    }`
});
scene.add(new THREE.Points(dg, diskMat));

/* ---------------- merkez spark (Claude yildizi) ---------------- */
function sparkTexture() {
  const s = 256, c = document.createElement('canvas'); c.width=c.height=s;
  const x = c.getContext('2d');
  const g = x.createRadialGradient(s/2,s/2,0,s/2,s/2,s/2);
  g.addColorStop(0,'rgba(255,255,255,1)');
  g.addColorStop(.15,'rgba(224,242,255,.95)');
  g.addColorStop(.4,'rgba(120,180,255,.35)');
  g.addColorStop(1,'rgba(0,0,0,0)');
  x.fillStyle=g; x.fillRect(0,0,s,s);
  // 4 kollu spark
  x.globalCompositeOperation='lighter';
  x.strokeStyle='rgba(255,255,255,.9)'; x.lineWidth=3;
  for(let k=0;k<4;k++){
    x.save(); x.translate(s/2,s/2); x.rotate(k*Math.PI/2);
    x.beginPath(); x.moveTo(0,-s*0.42); x.quadraticCurveTo(6,0,0,s*0.42); x.stroke();
    x.restore();
  }
  const t = new THREE.CanvasTexture(c); t.needsUpdate=true; return t;
}
const spark = new THREE.Sprite(new THREE.SpriteMaterial({
  map: sparkTexture(), color: 0xdfeeff, transparent: true, opacity:.7,
  blending: THREE.AdditiveBlending, depthWrite: false }));
spark.scale.set(3.4,3.4,3.4);
scene.add(spark);

// merkez ic parlama halkasi
const glow = new THREE.Sprite(new THREE.SpriteMaterial({
  map: sparkTexture(), color: 0x2a86ff, transparent: true, opacity:.4,
  blending: THREE.AdditiveBlending, depthWrite: false }));
glow.scale.set(10,10,10); scene.add(glow);

/* ---------------- postprocessing: bloom ---------------- */
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(W(), H()), 0.5, 0.6, 0.2);
bloom.strength = 0.55; bloom.radius = 0.6; bloom.threshold = 0.22;
composer.addPass(bloom);
composer.addPass(new OutputPass());

/* ---------------- sol node graph (SVG + HTML) ---------------- */
const NODES = [
  { x:12, y:6,  l:'BUSINESS', c:'warn' }, { x:34, y:4, l:'PERSONAL' },
  { x:8,  y:20, l:'SERVICES', c:'hot' }, { x:30, y:16, l:'CLIENTS' },
  { x:6,  y:34, l:'PRODUCTS · ERP', c:'hot' }, { x:26, y:30, l:'PIPELINE' },
  { x:10, y:47, l:'PLATFORM' }, { x:32, y:44, l:'COMPANION APP' },
  { x:7,  y:60, l:'SEO PROGRAM' }, { x:28, y:58, l:'GROWTH · AGENTS', c:'warn' },
  { x:16, y:72, l:'MEMORY CORE', c:'hot' }, { x:38, y:70, l:'ORCHESTRATION' },
  { x:20, y:86, l:'WORKFLOWS' },
];
const EDGES = [[0,2],[0,3],[1,3],[2,4],[3,5],[2,6],[4,6],[5,7],[6,8],[7,9],[8,10],[9,11],[10,12],[11,12],[6,7],[4,10]];
const graph = document.querySelector('.graph');
const svg = document.getElementById('edges');
const gw = () => graph.clientWidth, gh = () => graph.clientHeight;
NODES.forEach(n => {
  const d = document.createElement('div');
  d.className = 'node' + (n.c ? ' '+n.c : '');
  d.style.left = n.x + '%'; d.style.top = n.y + '%';
  d.innerHTML = `<div class="ring"></div><div class="lbl">${n.l}</div>`;
  graph.appendChild(d);
});
function drawEdges() {
  svg.innerHTML = '';
  EDGES.forEach(([a,b], i) => {
    const A = NODES[a], B = NODES[b];
    const x1 = A.x/100*gw(), y1 = A.y/100*gh();
    const x2 = B.x/100*gw(), y2 = B.y/100*gh();
    const ln = document.createElementNS('http://www.w3.org/2000/svg','line');
    ln.setAttribute('x1',x1); ln.setAttribute('y1',y1);
    ln.setAttribute('x2',x2); ln.setAttribute('y2',y2);
    const hot = A.c==='hot'||B.c==='hot';
    ln.setAttribute('stroke', hot ? 'rgba(52,211,153,.55)' : 'rgba(148,163,184,.28)');
    ln.setAttribute('stroke-width','1');
    if (i%3===0) ln.setAttribute('stroke-dasharray','3 4');
    svg.appendChild(ln);
  });
}
drawEdges();

/* ---------------- canli saat ---------------- */
const brief = document.getElementById('briefing');
function tick() {
  const d = new Date();
  let h = d.getHours(); const ap = h>=12?'PM':'AM'; h = h%12||12;
  const mm = String(d.getMinutes()).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  brief.textContent = `BRIEFING · LIVE ${dd} / 25 · ${String(h).padStart(2,'0')}:${mm} ${ap}`;
}
setInterval(tick, 1000); tick();

/* ---------------- render loop ---------------- */
let t0 = performance.now();
const _q = new URLSearchParams(location.search);
const FROZEN = _q.has('t') ? parseFloat(_q.get('t')) : null;  // ?t=SEC ile kareyi dondur
function animate() {
  requestAnimationFrame(animate);
  const t = FROZEN !== null ? FROZEN : (performance.now() - t0) / 1000;
  diskMat.uniforms.uTime.value = t;
  const pulse = 1 + Math.sin(t*1.6)*0.08;
  spark.scale.setScalar(3.4*pulse);
  glow.scale.setScalar(10*(1+Math.sin(t*1.1)*0.05));
  // yavas sinematik kamera drifti
  camera.position.x = Math.sin(t*0.12) * 5;
  camera.position.y = 13 + Math.sin(t*0.09) * 2.0;
  camera.lookAt(0, 0, 0);
  composer.render();
}
animate();

/* ---------------- resize ---------------- */
function resize() {
  renderer.setSize(W(), H()); composer.setSize(W(), H());
  camera.aspect = W()/H(); camera.updateProjectionMatrix();
  bloom.setSize(W(), H()); drawEdges();
}
addEventListener('resize', resize);
window.__ready = true;
</script>
